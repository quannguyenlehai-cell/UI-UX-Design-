<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Smart Home Dashboard</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b3c5d;
    }

    .dashboard {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-gap: 15px;
        padding: 20px;
    }

    .card {
        border-radius: 12px;
        padding: 15px;
        color: white;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .light {
        background: #f5f5f5;
        color: #333;
        text-align: center;
    }

    .light img {
        width: 60px;
    }

    .color-wheel {
        background: #fff;
        text-align: center;
    }

    .color-wheel img {
        width: 100%;
    }

    .temp {
        background: #e53935;
        font-size: 28px;
        text-align: center;
    }

    .humidity {
        background: #8e24aa;
        font-size: 28px;
        text-align: center;
    }

    .lux {
        background: #ff00cc;
        font-size: 28px;
        text-align: center;
    }

    .fan {
        grid-column: span 2;
        background: #e0e0e0;
        color: #000;
    }

    .fan input {
        width: 100%;
    }

    .assistant {
        grid-column: span 2;
        background: #1976d2;
        font-size: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .chart {
        grid-column: span 4;
        background: #fff;
        color: #000;
    }

    h3 {
        margin: 0 0 10px;
    }

    canvas {
        width: 100%;
        height: 250px;
    }
</style>
</head>

<body>

<div class="dashboard">

    <!-- Light -->
    <div class="card light">
        <h3>BÓNG ĐÈN</h3>
        <img src="https://cdn-icons-png.flaticon.com/512/427/427735.png">
    </div>


    <!-- Temperature -->
    <div class="card temp">
        <h3>NHIỆT ĐỘ</h3>
        <div>30.0°C</div>
    </div>

    <!-- Humidity -->
    <div class="card humidity">
        <h3>ĐỘ ẨM</h3>
        <div>55%</div>
    </div>

    <!-- Light intensity -->
    <div class="card lux">
        <h3>ÁNH SÁNG</h3>
        <div>72 lx</div>
    </div>

    <!-- Fan -->
    <div class="card fan">
        <h3>QUẠT</h3>
        <input type="range" min="0" max="100" value="72"
               oninput="fanValue.innerText=this.value">
        <div>Tốc độ: <span id="fanValue">72</span></div>
    </div>

    <!-- Assistant -->
    <div class="card assistant">
        TRỢ LÝ<br>Đèn đã bật
    </div>

    <!-- Chart -->
    <div class="card chart">
        <h3>LỊCH SỬ NHIỆT ĐỘ</h3>
        <canvas id="tempChart"></canvas>
    </div>

</div>

<script>
const canvas = document.getElementById("tempChart");
const ctx = canvas.getContext("2d");

const data = [28, 29, 30, 29.5, 30, 30.2, 30];
const w = canvas.width;
const h = canvas.height;

ctx.beginPath();
ctx.moveTo(0, h - data[0] * 5);

data.forEach((temp, i) => {
    ctx.lineTo(i * (w / data.length), h - temp * 5);
});

ctx.strokeStyle = "red";
ctx.lineWidth = 2;
ctx.stroke();
</script>

</body>
</html>
