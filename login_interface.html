<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Lock</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#0f1f3a,#071226);
    color:white;
}

.container{
    text-align:center;
    width:420px;
}

.card{
    background:#3b4556;
    border-radius:15px;
    padding:40px;
    margin-bottom:30px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.lock-icon{
    font-size:60px;
    margin-bottom:10px;
}

.status{
    display:inline-block;
    margin-top:10px;
    padding:10px 20px;
    border-radius:8px;
    background:#e02d4c;
    font-weight:bold;
}

button{
    width:100%;
    padding:16px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    color:white;
}

.face{
    background:#2d6cff;
}

.voice{
    background:linear-gradient(90deg,#7a00ff,#b300ff);
}

.manual{
    background:#030615;
}

.info{
    margin-top:25px;
    padding:15px;
    border-radius:10px;
    background:#3b4556;
    font-size:14px;
    color:#ddd;
}

button:hover{
    opacity:0.85;
}

</style>
</head>

<body>

<div class="container">

<div class="card">
    <div class="lock-icon">🔒</div>
    <h2>Smart Lock</h2>
    <div class="status" id="status">LOCKED</div>
</div>

<button class="face" onclick="face()">📷 Activate Facial Recognition</button>

<button class="voice" onclick="voice()">🎤 Voice Recognition</button>

<button class="manual" onclick="unlock()">🔓 Manual Unlock</button>

<div class="info">
Use facial or voice recognition to unlock.  
Voice commands: <b>"unlock door"</b> or <b>"open sesame"</b>
</div>

</div>

<script>

function unlock(){
    document.getElementById("status").innerText="UNLOCKED";
    document.getElementById("status").style.background="green";
}

function face(){
    alert("Facial recognition activated (demo)");
}

function voice(){
    alert("Voice recognition activated (demo)");
}

</script>

</body>
</html>
